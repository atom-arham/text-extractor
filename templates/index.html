<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Stuff</title>
    <style>
        /* I've use rose pine pallete : ) */
        body { background-color: #232136;color: #e0def4; font-family: 'Courier New', monospace; 
            max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.5;}
        h1 { color: #ea9a97; border-bottom: 1px solid #393552; padding-bottom: 10px; }
	    .image-preview-container { min-height: 210px; min-width: 210px; display: flex; 
                               justify-content: flex-start; align-items: center; }

        button { background: #393552; color: #9ccfd8; border: 1px solid #3e8fb0; 
                padding: 8px 15px; cursor: pointer; font-family: inherit; }

        button:hover { background: #44415a; color: #ea9a97; }

        input[type="file"] { color: #908caa; margin-bottom: 10px;}

        img { border: 1px solid #393552; border-radius: 4px; margin-top: 10px; }

        textarea { background-color: #2a273f; color: #e0def4; border: 1px solid #393552; padding: 10px;
            font-family: inherit; display: block; margin-top: 10px; width: 100%; }

        label { color: #f6c177; font-weight: bold; }
    </style>
    
</head>
<body>
    <h1>Upload Files</h1>
    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="file" id="file">
        <button type="submit" name="action" value="upload">Upload</button>
    </form>
    
    <br>
    <div class="image-preview-container">
    {% if filename %}
        <img src="{{ url_for('static', filename=filename) }}" height="200" width="200">
    {% endif %}
    </div>

    <br>
    <br>

    <form action="/start" method="POST">
        <button type="submit">Start OCR</button>
    </form>

    <br>
    <br>

    <label for="output-box">Output results:</label><br>
    <textarea id="output-box" rows="10" cols="80">{{ status_message if status_message else 'No data yet...' }}</textarea>

</body>
</html>
